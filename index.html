<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musticool12 Creator</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
text-align:center;
}

header{
padding:60px 20px;
}

h1{
font-size:50px;
margin-bottom:10px;
}

p{
font-size:20px;
opacity:0.9;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:25px;
background:white;
color:#333;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

section{
background:white;
color:#333;
padding:60px 20px;
}

.card-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
}

.card{
background:#f5f5f5;
padding:25px;
border-radius:15px;
width:220px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

footer{
padding:20px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<header>
<h1>Musticool12 Creator 🚀</h1>
<p>Willkommen auf meiner Webseite</p>
<button onclick="alert('Danke fürs Besuchen!')">Mehr erfahren</button>
</header>

<section>

<h2>Über mich</h2>

<div class="card-container">

<div class="card">
<h3>🌍 Projekte</h3>
<p>Ich erstelle Webseiten und coole Projekte.</p>
</div>

<div class="card">
<h3>💻 Coding</h3>
<p>Ich lerne Programmieren und Webentwicklung.</p>
</div>

<div class="card">
<h3>🚀 Zukunft</h3>
<p>Viele neue Ideen und Projekte kommen noch.</p>
</div>

</div>

</section>

<footer>
© 2026 Musticool12 Creator
</footer>

</body>
</html>
